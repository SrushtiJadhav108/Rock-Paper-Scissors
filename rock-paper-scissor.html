<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissor</title>

</head>
<body>
     <h1>Rock Paper Scissors</h1>
     <div class="result">
        <p id="user-choice">User Choice: </p>
         <p id="computer-choice">Computer Choice: </p>
         <p id="result"></p>
     </div>
     <div class="game">
        <button id="rock" onclick="playGame('rock')">🪨</button>
        <button id="paper" onclick="playGame('paper')">📄</button>
        <button id="scissor" onclick="playGame('scissor')">✂️</button>
     </div>
     <div class="counts">
         <p id="your-wins">Your Wins: </p>
         <p id="computer-wins">Computer Wins: </p>
         <p id="draws">Draw: </p>
      </div>
     
    <script src="script.js"></script>
</body>

</html>
